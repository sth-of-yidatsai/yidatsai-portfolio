<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YI-DA TSAI</title>

    <!-- SEO: static fallback for social crawlers that don't execute JS -->
    <meta name="description" content="Yi-Da Tsai is a graphic designer specializing in editorial design, typography, and visual communication." />
    <meta property="og:title" content="YI-DA TSAI" />
    <meta property="og:description" content="Yi-Da Tsai is a graphic designer specializing in editorial design, typography, and visual communication." />
    <meta property="og:image" content="https://yidatsai.com/images/og-default.jpg" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yidatsai.com" />
    <meta property="og:site_name" content="YI-DA TSAI" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="YI-DA TSAI" />
    <meta name="twitter:description" content="Yi-Da Tsai is a graphic designer specializing in editorial design, typography, and visual communication." />
    <meta name="twitter:image" content="https://yidatsai.com/images/og-default.jpg" />
    <link rel="canonical" href="https://yidatsai.com" />

    <!-- 預連線加速 Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Manrope (英文) + Noto Sans TC (繁體中文) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Noto+Sans+TC:wght@100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Static pre-loader shield: covers the page before JS/React loads,
         preventing a flash of page content. Removed by the Loader component on mount. -->
    <div id="loader-shield" style="position:fixed;inset:0;background:#0a0a0a;z-index:10000;pointer-events:none;"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Anime.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/2.0.2/anime.min.js"></script>
  </body>
</html>
